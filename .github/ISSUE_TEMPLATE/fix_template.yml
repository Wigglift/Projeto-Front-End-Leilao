name: Fix
description: Correção solicitada com base no feedback do professor
title: "[FIX]: "
labels: ["fix"]
body:
  - type: textarea
    id: feedback
    attributes:
      label: Feedback do professor
      description: Copie o feedback.
      placeholder: "Ex: Ajustar lógica do algoritmo X, pois falha em casos de borda"
    validations:
      required: true

  - type: textarea
    id: observations
    attributes:
      label: Observações
      description: "Caso tenha alguma observação:"
    validations:
      required: false
      
  - type: checkboxes
    id: status
    attributes:
      label: Status
      options:
        - label: Em desenvolvimento
        - label: Concluído
