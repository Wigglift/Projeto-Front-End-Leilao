name: Fix
description: Correção solicitada com base no feedback do professor
title: "[FIX]: "
labels: ["fix"]
body:
  - type: textarea
    id: feedback
    attributes:
      label: Feedback do professor
      description: Copie o feedback exatamente como foi passado. Não interprete, não filtre.
      placeholder: Ex: Ajustar lógica do algoritmo X, pois falha em casos de borda
    validations:
      required: true

  - type: checkboxes
    id: status
    attributes:
      label: Status
      options:
        - label: Em desenvolvimento
        - label: Concluído
